<ng-diagram-node-resize-adornment>
  <div
    class="custom-group"
    [ngStyle]="{
      '--custom-node-color': color,
      '--custom-node-width': size.width + 'px',
      '--custom-node-height': size.height + 'px',
    }"
    ngDiagramGroupHighlighted
    ngDiagramNodeSelected
    [node]="node()"
  >
    <div class="label">{{ label }}</div>
  </div>
</ng-diagram-node-resize-adornment>
