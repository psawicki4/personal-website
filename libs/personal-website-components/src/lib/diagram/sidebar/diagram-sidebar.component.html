<lib-card class="w-80 h-fit" *transloco="let t; prefix: 'DIAGRAM_SIDEBAR'">
  <div class="flex flex-col gap-4">
    <div class="flex items-center gap-2 mb-2">
      <mat-icon>settings</mat-icon>
      <h2 class="text-xl font-semibold">{{ selectedNode() ? t('properties') : t('no-selection') }}</h2>
    </div>

    @if (selectedNode()) {
      <form [formGroup]="form" (ngSubmit)="updateNode()" class="flex flex-col gap-2">
        <mat-form-field appearance="outline" class="w-full">
          <mat-label>{{ t('label') }}</mat-label>
          <input matInput formControlName="label" (blur)="updateNode()" />
          @if (form.get('label')?.hasError('required')) {
            <mat-error>{{ t('required-field') }}</mat-error>
          }
        </mat-form-field>

        <div class="flex gap-2">
          <mat-form-field appearance="outline" class="w-full">
            <mat-label>X</mat-label>
            <input matInput type="number" formControlName="x" (blur)="updateNode()" />
          </mat-form-field>

          <mat-form-field appearance="outline" class="w-full">
            <mat-label>Y</mat-label>
            <input matInput type="number" formControlName="y" (blur)="updateNode()" />
          </mat-form-field>
        </div>

        <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid">
          {{ t('update') }}
        </button>
      </form>
    } @else {
      <p class="text-sm text-gray-400">{{ t('select-node-hint') }}</p>
    }
  </div>
</lib-card>
