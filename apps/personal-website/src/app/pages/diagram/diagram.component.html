<ng-container *transloco="let t; prefix: 'GRID'">
  <lib-card class="h-full">
    <div class="flex flex-col gap-4 h-full">
      <h1 class="text-3xl mb-6">{{ t('header') }}</h1>
      @if (portrait()) {
        <div class="flex flex-col gap-4 items-center">
          <mat-icon class="screenRotationSize">screen_rotation</mat-icon>
          <p class="text-xl">{{ t('landscape') }}</p>
        </div>
      } @else {
        <p>{{ t('component-desc') }}</p>
        <div class="grow flex gap-4 min-h-0">
          <lib-diagram-palette />
          <div class="grow border border-white/10 rounded-lg overflow-hidden relative">
            @defer {
              <ng-diagram [model]="model" [config]="config" [nodeTemplateMap]="nodeTemplates" />
            }
          </div>
        </div>
      }
    </div>
  </lib-card>
</ng-container>
