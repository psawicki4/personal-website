<ng-container *transloco="let t; prefix: 'DIAGRAM'">
  <lib-card class="h-full">
    <div class="flex flex-col gap-4 h-full">
      <h1 class="text-3xl mb-6">{{ t('header') }}</h1>
      @if (portrait()) {
        <div class="flex flex-col gap-4 items-center">
          <mat-icon class="screenRotationSize">screen_rotation</mat-icon>
          <p class="text-xl">{{ t('landscape') }}</p>
        </div>
      } @else {
        <p>{{ t('component-desc') }}</p>
        @defer {
          <div class="grow flex relative">
            <ng-diagram
              [model]="model"
              [config]="config"
              [nodeTemplateMap]="nodeTemplates"
              [edgeTemplateMap]="edgeTemplates"
            >
              <ng-diagram-background />
            </ng-diagram>

            <lib-diagram-palette class="palette" />
            <lib-diagram-sidebar class="sidebar" />
          </div>
        }
      }
    </div>
  </lib-card>
</ng-container>
